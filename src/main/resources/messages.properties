style.tip.shadowing=Off gives a flatter, cleaner look that is easier to read.
style.tip.monochrome=Grayscale rendering for black-and-white printing or color-independent docs (Reverse suits dark backgrounds).
style.tip.roundCorner=Corner radius for boxes in pixels; 0 keeps the PlantUML default square corners.
