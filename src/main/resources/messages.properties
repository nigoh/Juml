errcode.UML-R001.summary=Rendering failed due to a syntax error in the generated PlantUML
errcode.UML-R001.remedy=Check the reported line in logs/render-failed-*.puml. For generated (non-editor) diagrams this usually indicates a Juml generator bug; report the ID together with the log details.
errcode.UML-R002.summary=The layout engine failed to render the diagram
errcode.UML-R002.remedy=With Graphviz disabled the pure-Java Smetana layout is used and large diagrams may fail. Enable Graphviz (dot) via the Diagram menu, or reduce the diagram with package selection, presets, or scope.
errcode.UML-R003.summary=Rendering failed due to insufficient memory
errcode.UML-R003.remedy=Narrow the target package/scope to shrink the diagram, or increase the JVM heap with -Xmx and retry.
errcode.UML-R004.summary=Unexpected error while handling the render result
errcode.UML-R004.remedy=If re-rendering does not help, report the ID with the stack trace shown in the log viewer.
errcode.UML-R005.summary=Failed to save the failing PlantUML dump
errcode.UML-R005.remedy=Check free space and write permission of the logs directory. See the preceding UML-R error for the render failure itself.
errcode.UML-R006.summary=PNG rendering returned a PlantUML error image
errcode.UML-R006.remedy=Check whether SVG rendering of the same diagram succeeds. If SVG fails too, follow the remedies of UML-R001 / UML-R002.
errcode.UML-R007.summary=Diagram rendering failed (unclassified)
errcode.UML-R007.remedy=Check the log viewer details and logs/render-failed-*.puml, and report them with this ID.
errcode.UML-R008.summary=The configured Graphviz (dot) binary cannot be executed
errcode.UML-R008.remedy=Check the GRAPHVIZ_DOT setting / environment variable points to an existing executable dot. Re-detect via Diagram > Enable Graphviz (dot)..., or remove the setting to fall back to the built-in Smetana layout.
errcode.UML-E001.summary=The PlantUML you are editing has a syntax error
errcode.UML-E001.remedy=Fix the line highlighted in red in the editor. The PlantUML diagnostics are shown on the error card and in the log.
errcode.UML-E002.summary=Layout failed for the PlantUML you are editing
