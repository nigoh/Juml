style.tip.rankSep=ranksep: vertical gap between ranks. 0 = PlantUML default.
style.tip.customSkinparam=Raw PlantUML lines, e.g.
style.tip.showComments=Render class / method JavaDoc and body comments as notes at the top of sequence diagrams.
style.tip.commentStyle=INLINE: short single-line note per call. NOTE: multi-line note block grouping the called method's JavaDoc.
style.tip.commentPlacement=AT_CALL_SITE: show each method's JavaDoc directly under its call arrow. PARTICIPANT_TOP: aggregate JavaDoc under participant declarations (legacy).
style.tip.qualify=When checked: call arrows are labelled 'Class.method()'. Unchecked: just 'method()'.
style.tip.hiddenAnnotations=Comma-separated annotation names to hide (e.g. Override,Nullable,NonNull)
style.tip.colorCodeRelations=Color and style relation lines by kind so is-a (inherit=green/implement=blue) and uses (dependency=gray dashed) are easy to separate on large diagrams.
style.tip.hideEmptyMembers=Collapse the empty field/method compartment on classes that lack one, tightening interface- and constant-heavy diagrams (hide empty members).
style.tip.hideUnlinked=Drop classes that have no relation line at all, keeping only the connected structure on large auto-generated diagrams (remove @unlinked).
style.tip.colorCodeStereotypes=Tint each class box by its stereotype (CarManager, Activity, Service, aidl, record, ...) with a fixed pastel palette so categories are easy to spot on large diagrams.
style.tip.commentMaxLength=0 disables inline comments. 80 is the default.
style.tip.maxDepth=Number of method-call levels to expand (1-10). Default: 4.
style.tip.seqMaxDepth=How deep nested method calls are expanded into the sequence (1-10). 0 = unlimited (stops at recursion cycles). Default: 5.
style.tip.actExpandCallbacks=Expand the body of lambdas / anonymous classes passed as arguments into partition blocks.
style.tip.actShowLocalVars=Show local variable declarations as action nodes in the flow.
style.tip.actShowAssignments=Show assignment and increment/decrement statements (x = ..., x += ..., i++) as action nodes in the flow.
style.tip.actShowCallArgs=Show the source text of call arguments inside action nodes. Lambda / anonymous-class arguments are collapsed to a lambda symbol.
style.tip.seqShowArgs=Show the source text of call arguments on message arrows (long arguments are truncated). When unchecked, only constant-symbol first arguments are shown.
style.tip.actShowInlineComments=Show comments written inside the method body as notes next to the flow.
style.tip.reset=Restore all style settings to factory defaults
style.tip.optimize=Apply readability-friendly defaults: plain theme, no shadows, ortho lines, wider spacing. (font / background unchanged)
