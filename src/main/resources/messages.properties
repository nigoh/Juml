# Tooltips
style.tip.bgColor=PlantUML color value, e.g. #FFFFFF, white, transparent
style.tip.fontSize=0 = use PlantUML default
style.tip.lineType=Relation line routing. Ortho reduces crossings on dense class diagrams.
style.tip.shadowing=Off gives a flatter, cleaner look that is easier to read.
style.tip.nodeSep=nodesep: horizontal gap between nodes. 0 = PlantUML default.
style.tip.rankSep=ranksep: vertical gap between ranks. 0 = PlantUML default.
style.tip.customSkinparam=Raw PlantUML lines, e.g.
style.tip.showComments=Render class / method JavaDoc and body comments as notes at the top of sequence diagrams.
style.tip.commentStyle=INLINE: short single-line note per call. NOTE: multi-line note block grouping the called method's JavaDoc.
style.tip.commentPlacement=AT_CALL_SITE: show each method's JavaDoc directly under its call arrow. PARTICIPANT_TOP: aggregate JavaDoc under participant declarations (legacy).
style.tip.qualify=When checked: call arrows are labelled 'Class.method()'. Unchecked: just 'method()'.
style.tip.hiddenAnnotations=Comma-separated annotation names to hide (e.g. Override,Nullable,NonNull)
style.tip.colorCodeRelations=Color and style relation lines by kind so is-a (inherit=green/implement=blue) and uses (dependency=gray dashed) are easy to separate on large diagrams.
style.tip.commentMaxLength=0 disables inline comments. 80 is the default.
style.tip.maxDepth=Number of method-call levels to expand (1-10). Default: 4.
style.tip.reset=Restore all style settings to factory defaults
style.tip.optimize=Apply readability-friendly defaults: plain theme, no shadows, ortho lines, wider spacing. (font / background unchanged)
