name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.6). Required when running manually.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build artifacts
        run: ./gradlew --no-daemon check jar makeZip

      - name: Collect artifacts
        id: collect
        run: |
          mkdir -p release-assets
          cp build/libs/Juml.jar release-assets/
          cp build/distributions/juml-*.zip release-assets/
          ls -la release-assets/
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          ls release-assets/* >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGE.md
        id: notes
        run: |
          tag="${{ steps.tag.outputs.name }}"
          version="${tag#v}"
          python3 - <<PY > release-notes.md
          import re, sys
          version = "${version}"
          with open("CHANGE.md", encoding="utf-8") as f:
              text = f.read()
          # Split into sections: lines that look like "X.Y" followed by a "----" underline.
          pattern = re.compile(r"^(?P<ver>\d+(?:\.\d+)+)\n-+\n", re.MULTILINE)
          matches = list(pattern.finditer(text))
          body = ""
          for i, m in enumerate(matches):
              if m.group("ver") == version:
                  start = m.end()
                  end = matches[i + 1].start() if i + 1 < len(matches) else len(text)
                  body = text[start:end].strip()
                  break
          if not body:
              body = f"Release {version}"
          sys.stdout.write(body + "\n")
          PY
          echo "--- release notes ---"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Juml ${{ steps.tag.outputs.name }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            release-assets/Juml.jar
            release-assets/juml-*.zip

  # Windows 向け自己完結 exe (JRE 同梱の app-image) を Windows ランナーで生成し、
  # 上で作成済みの同一タグの Release に追加添付する。jpackage はホスト OS 向けの
  # イメージしか作れないため、Windows exe はこのジョブ (windows-latest) で生成する。
  package-windows:
    needs: build-and-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # jar (fat jar) → jpackageZip で Juml.exe + runtime を含む app-image を ZIP 化する。
      - name: Build Windows app-image (Juml.exe)
        run: ./gradlew --no-daemon jar jpackageZip

      - name: Upload exe zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: build/distributions/Juml-windows-*.zip
